<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <h1>Trying out lists!</h1>
    <h2>Unordered Lists</h2>
    <ul>
        <li><strong>Red</strong></li>
        <li>Orange</li>
        <li><em>Yellow</em></li>
        <li>Green</li>
        <li>Blue</li>
        <li>Indigo</li>
        <li>Voilet</li>
    </ul>
    <h2>Ordered Lists</h2>
    <ol>
        <li>Red</li>
        <li>Orange</li>
        <li>Yellow</li>
        <li>Green</li>
        <li>Blue</li>
        <li>Indigo</li>
        <li>Violet</li>
    </ol>
</body>
</html>
